<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhaskara</title>

    <!-- Fonte medieval -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #f8c8dc, #d8b4f8, #b4d4f8);
        }

        .container {
            background-color: #f3e8ff;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
            position: relative;
        }

        .corner {
            position: absolute;
            font-size: 22px;
            letter-spacing: 3px;
        }

        .top-left { top: -15px; left: -10px; }
        .top-right { top: -15px; right: -10px; }
        .bottom-left { bottom: -15px; left: -10px; }
        .bottom-right { bottom: -15px; right: -10px; }

        .azul { color: #3b82f6; }
        .rosa { color: #ec4899; }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 34px;
            color: #1e3a8a;
            margin-bottom: 10px;
        }

        p, label {
            color: #1e3a8a;
        }

        .formula {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        input[type="number"] {
            width: 60px;
            padding: 8px;
            border-radius: 0;
            border: 2px solid #7c3aed;
            outline: none;
            text-align: center;
        }

        input[type="number"]:focus {
            border-color: #4c1d95;
        }

        input[type="button"] {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #7c3aed;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* ✨ ANIMAÇÃO DE PISCAR */
        @keyframes piscar {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .piscar {
            animation: piscar 0.3s ease 2;
        }

        #saida {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #4c1d95;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Cantos -->
        <div class="corner top-left">
            <span class="azul">✿</span><span class="rosa">✦</span><span class="azul">❀</span>
        </div>
        <div class="corner top-right">
            <span class="rosa">✧</span><span class="azul">❀</span><span class="rosa">✦</span>
        </div>
        <div class="corner bottom-left">
            <span class="azul">✦</span><span class="rosa">✿</span><span class="azul">✧</span>
        </div>
        <div class="corner bottom-right">
            <span class="rosa">❀</span><span class="azul">✧</span><span class="rosa">✿</span>
        </div>

        <h1>Bhaskara</h1>
        <p>a.x² + b.x + c</p>

            <input type="number" id="A" placeholder="a">
            <input type="number" id="B" placeholder="b">
            <input type="number" id="C" placeholder="c">
            <br>

        <input type="button" value="Calcular" onclick="animarBotao(this)">

        <span id="saida">...</span>
    </div>

    <script src="./bhaskara.js"></script>

</body>
</html>
